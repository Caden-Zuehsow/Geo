<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>BioGuessr - Puerto Rico</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>

<h2>BioGuessr — Puerto Rico</h2>

<button id="startBtn">Start Round</button>

<div id="map" style="width:100%; height:400px;"></div>

<h3>Guess the Species</h3>
<div id="choices"></div>

<h3 id="result"></h3>
<h3>Score: <span id="score">0</span></h3>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([18.2, -66.5], 8);

// Satellite map
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19
}).addTo(map);

let marker;
let score = 0;
let correctAnswer = "";

// Start button
document.getElementById("startBtn").onclick = startRound;

function startRound() {
  document.getElementById("result").textContent = "";
  document.getElementById("choices").innerHTML = "Loading...";

  const lat = 17.8 + Math.random() * (18.5 - 17.8);
  const lng = -67.3 + Math.random() * (-65.2 + 67.3);

  if (marker) map.removeLayer(marker);
  marker = L.marker([lat, lng]).addTo(map);
  map.setView([lat, lng], 10);

  loadGame(lat, lng);
}

// Main game logic
async function loadGame(lat, lng) {
  try {
    // Get species at location
    const localRes = await fetch(
      `https://api.inaturalist.org/v1/observations/species_counts?lat=${lat}&lng=${lng}&radius=25&per_page=20`
    );
    const localData = await localRes.json();

    if (localData.results.length < 4) {
      startRound(); // retry if not enough data
      return;
    }

    // Pick correct species
    const correct = localData.results[
      Math.floor(Math.random() * localData.results.length)
    ];

    correctAnswer =
      correct.taxon.preferred_common_name || correct.taxon.name;

    const taxonId = correct.taxon.ancestor_ids[1]; // broad group (birds, plants, etc.)

    // Get similar species from elsewhere in Puerto Rico
    const otherRes = await fetch(
      `https://api.inaturalist.org/v1/observations/species_counts?place_id=6985&taxon_id=${taxonId}&per_page=50`
    );
    const otherData = await otherRes.json();

    // Build wrong answers
    const wrongAnswers = [];

    otherData.results.forEach(item => {
      const name =
        item.taxon.preferred_common_name || item.taxon.name;

      if (name !== correctAnswer && wrongAnswers.length < 3) {
        wrongAnswers.push(name);
      }
    });

    // Combine & shuffle
    const options = [correctAnswer, ...wrongAnswers]
      .sort(() => Math.random() - 0.5);

    displayChoices(options);

  } catch (err) {
    console.error(err);
    document.getElementById("choices").textContent = "Error loading data";
  }
}

// Display buttons
function displayChoices(options) {
  const container = document.getElementById("choices");
  container.innerHTML = "";

  options.forEach(option => {
    const btn = document.createElement("button");
    btn.textContent = option;

    btn.onclick = () => checkAnswer(option);

    container.appendChild(btn);
  });
}

// Check answer
function checkAnswer(selected) {
  const result = document.getElementById("result");

  if (selected === correctAnswer) {
    result.textContent = "✅ Correct!";
    score += 100;
  } else {
    result.textContent = `❌ Wrong! Correct answer: ${correctAnswer}`;
    score -= 50;
  }

  document.getElementById("score").textContent = score;
}
</script>

</body>
</html>
