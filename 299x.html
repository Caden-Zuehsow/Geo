<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>BioGuessr - Puerto Rico</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>

<h2>BioGuessr — Puerto Rico</h2>

<button id="startBtn">Start Round</button>

<div id="map" style="width:100%; height:400px;"></div>

<h3>Guess the Species</h3>
<div id="choices"></div>

<h3 id="result"></h3>
<h3>Score: <span id="score">0</span></h3>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([18.2, -66.5], 8);

// Satellite map
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19
}).addTo(map);

let marker;
let score = 0;
let correctAnswer = "";
let attempts = 0;

// Start button
document.getElementById("startBtn").onclick = startRound;

function startRound() {
  attempts = 0;
  newRound();
}

function newRound() {
  document.getElementById("result").textContent = "";
  document.getElementById("choices").innerHTML = "Loading...";

  const lat = 17.8 + Math.random() * (18.5 - 17.8);
  const lng = -67.3 + Math.random() * (-65.2 + 67.3);

  if (marker) map.removeLayer(marker);
  marker = L.marker([lat, lng]).addTo(map);
  map.setView([lat, lng], 10);

  loadGame(lat, lng);
}

// Main game logic
async function loadGame(lat, lng) {
  try {
    // Get species at location
    const localRes = await fetch(
      `https://api.inaturalist.org/v1/observations/species_counts?lat=${lat}&lng=${lng}&radius=25&per_page=20`
    );
    const localData = await localRes.json();

    if (!localData.results || localData.results.length < 4) {
      retryRound();
      return;
    }

    // Pick correct species
    const correct = localData.results[
      Math.floor(Math.random() * localData.results.length)
    ];

    if (!correct.taxon) {
      retryRound();
      return;
    }

    correctAnswer =
      correct.taxon.preferred_common_name || correct.taxon.name;

    const taxonId = correct.taxon.iconic_taxon_id;

    if (!taxonId) {
      retryRound();
      return;
    }

    // Get similar species across Puerto Rico (bounding box)
    const otherRes = await fetch(
      `https://api.inaturalist.org/v1/observations/species_counts?nelat=18.5&nelng=-65.2&swlat=17.8&swlng=-67.3&taxon_id=${taxonId}&per_page=50`
    );
    const otherData = await otherRes.json();

    if (!otherData.results) {
      retryRound();
      return;
    }

    // Build wrong answers safely
    const wrongAnswers = [];

    for (let item of otherData.results) {
      const name =
        item.taxon?.preferred_common_name || item.taxon?.name;

      if (name && name !== correctAnswer && !wrongAnswers.includes(name)) {
        wrongAnswers.push(name);
      }

      if (wrongAnswers.length >= 3) break;
    }

    // Fallback if not enough
    while (wrongAnswers.length < 3) {
      wrongAnswers.push("Unknown Species");
    }

    // Combine & shuffle
    const options = [correctAnswer, ...wrongAnswers]
      .sort(() => Math.random() - 0.5);

    displayChoices(options);

  } catch (err) {
    console.error(err);
    document.getElementById("choices").textContent = "Error loading data";
  }
}

// Retry logic (prevents infinite loop)
function retryRound() {
  attempts++;
  if (attempts > 5) {
    document.getElementById("choices").textContent = "Could not load data. Try again.";
    return;
  }
  newRound();
}

// Display buttons
function displayChoices(options) {
  const container = document.getElementById("choices");
  container.innerHTML = "";

  options.forEach(option => {
    const btn = document.createElement("button");
    btn.textContent = option;

    btn.onclick = () => checkAnswer(option);

    container.appendChild(btn);
  });
}

// Check answer
function checkAnswer(selected) {
  const result = document.getElementById("result");

  if (selected === correctAnswer) {
    result.textContent = "✅ Correct!";
    score += 100;
  } else {
    result.textContent = `❌ Wrong! Correct answer: ${correctAnswer}`;
    score -= 50;
  }

  document.getElementById("score").textContent = score;
}
</script>

</body>
</html>
