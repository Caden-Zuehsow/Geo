<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Game - Puerto Rico</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    :root {
      --bg:#11284B;
      --panel:#1A355F;
      --accent:#4A90D6;
      --accent2:#3CB371;
      --text:#E8E8E8;
    }

    body {
      margin:0;
      padding:20px;
      font-family:system-ui, Arial;
      background:var(--bg);
      color:var(--text);
      display:flex;
      justify-content:center;
    }

    #container {
      width:100%;
      max-width:900px;
    }

    h2 {
      text-align:center;
      color:var(--accent);
    }

    .panel {
      background:var(--panel);
      padding:12px;
      border-radius:12px;
      margin-bottom:12px;
    }

    button {
      padding:10px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-weight:600;
      background:var(--accent);
      color:white;
    }

    button:hover {
      background:var(--accent2);
    }

    #map {
      width:100%;
      height:350px;
      border-radius:10px;
    }

    #choices {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .choice {
      width:150px;
      background:#0f2442;
      border-radius:10px;
      padding:6px;
      text-align:center;
      cursor:pointer;
      transition:transform 0.15s ease, background 0.2s;
      font-size:0.9rem;
    }

    .choice:hover {
      transform:scale(1.05);
      background:#183a6b;
    }

    .choice img {
      width:100%;
      height:90px;
      object-fit:cover;
      border-radius:6px;
      margin-bottom:4px;
    }

    #result {
      text-align:center;
      font-weight:600;
    }

    #scoreBox {
      text-align:center;
      font-size:1.1rem;
      font-weight:600;
    }

    select {
      padding:6px;
      border-radius:6px;
      border:none;
    }

    .controls {
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
    }
  </style>
</head>

<body>

<div id="container">

<h2>Game — Puerto Rico</h2>

<div class="panel controls">
  <select id="filter">
    <option value="">All</option>
    <option value="3">Birds</option>
    <option value="47126">Plants</option>
    <option value="47158">Insects</option>
    <option value="40151">Mammals</option>
    <option value="26036">Reptiles</option>
    <option value="20978">Amphibians</option>
  </select>

  <button id="startBtn">Next Round</button>
</div>

<div class="panel">
  <div id="map"></div>
</div>

<div class="panel">
  <h3 style="text-align:center;">Guess the Species</h3>
  <div id="choices"></div>
</div>

<div class="panel">
  <div id="result"></div>
  <div id="scoreBox">Score: <span id="score">0</span></div>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([18.2, -66.5], 8);

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19
}).addTo(map);

let marker;
let score = 0;
let correctAnswer = "";
let attempts = 0;
let answered = false;

document.getElementById("startBtn").onclick = startRound;
document.getElementById("filter").onchange = startRound;

function startRound() {
  attempts = 0;
  newRound();
}

function newRound() {
  answered = false;
  document.getElementById("result").textContent = "";
  document.getElementById("choices").innerHTML = "Loading...";

  const lat = 17.8 + Math.random() * (18.5 - 17.8);
  const lng = -67.3 + Math.random() * (-65.2 + 67.3);

  if (marker) map.removeLayer(marker);
  marker = L.marker([lat, lng]).addTo(map);
  map.setView([lat, lng], 10);

  loadGame(lat, lng);
}

async function loadGame(lat, lng) {
  try {
    const filter = document.getElementById("filter").value;

    // Puerto Rico species (correct pool)
    let localURL = `https://api.inaturalist.org/v1/observations/species_counts?lat=${lat}&lng=${lng}&radius=25&per_page=20`;
    if (filter) localURL += `&taxon_id=${filter}`;

    const localRes = await fetch(localURL);
    const localData = await localRes.json();

    if (!localData.results || localData.results.length < 4) {
      retryRound();
      return;
    }

    const correct = localData.results[
      Math.floor(Math.random() * localData.results.length)
    ];

    correctAnswer =
      correct.taxon.preferred_common_name || correct.taxon.name;

    const correctPhoto =
      correct.taxon.default_photo?.medium_url || "";

    const taxonId = filter || correct.taxon.iconic_taxon_id;

  const wrongPlaces = [6, 97394, 97391, 97392, 97393, 14, 1];
const randomPlace = wrongPlaces[Math.floor(Math.random() * wrongPlaces.length)];

const wrongRes = await fetch(
  `https://api.inaturalist.org/v1/observations/species_counts?place_id=${randomPlace}&taxon_id=${taxonId}&per_page=200`
);
const wrongData = await wrongRes.json();

const shuffledWrong = wrongData.results.sort(() => Math.random() - 0.5);

const options = [];

options.push({
  name: correctAnswer,
  photo: correctPhoto,
  correct: true
});

// add wrong answers
for (let item of shuffledWrong) {
  const name = item.taxon?.preferred_common_name || item.taxon?.name;
  const photo = item.taxon?.default_photo?.medium_url || "";

  if (
    name &&
    name !== correctAnswer &&
    !options.find(o => o.name === name)
  ) {
    options.push({
      name: name,
      photo: photo,
      correct: false
    });
  }

  if (options.length >= 4) break;
}

    for (let item of wrongData.results) {
      const name =
        item.taxon?.preferred_common_name || item.taxon?.name;

      const photo =
        item.taxon?.default_photo?.medium_url || "";

      if (
        name &&
        name !== correctAnswer &&
        !options.find(o => o.name === name)
      ) {
        options.push({
          name: name,
          photo: photo,
          correct: false
        });
      }

      if (options.length >= 4) break;
    }

    while (options.length < 4) {
      options.push({
        name: "Unrelated Species",
        photo: "",
        correct: false
      });
    }

    options.sort(() => Math.random() - 0.5);

    displayChoices(options);

  } catch (err) {
    console.error(err);
    document.getElementById("choices").textContent = "Error loading data";
  }
}

function retryRound() {
  attempts++;
  if (attempts > 5) {
    document.getElementById("choices").textContent = "Could not load data.";
    return;
  }
  newRound();
}

function displayChoices(options) {
  const container = document.getElementById("choices");
  container.innerHTML = "";

  options.forEach(option => {
    const div = document.createElement("div");
    div.className = "choice";

    div.innerHTML = `
      ${option.photo ? `<img src="${option.photo}">` : ""}
      <div>${option.name}</div>
    `;

    div.onclick = () => checkAnswer(option);

    container.appendChild(div);
  });
}

function checkAnswer(option) {
  if (answered) return;
  answered = true;

  const result = document.getElementById("result");

  document.querySelectorAll(".choice").forEach(c => {
    c.style.pointerEvents = "none";
  });

  if (option.correct) {
    result.textContent = "✅ Correct!";
    score += 100;
  } else {
    result.textContent = `❌ Wrong! Correct: ${correctAnswer}`;
    score -= 50;
  }

  document.getElementById("score").textContent = score;
}
</script>

</body>
</html>
