<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>BioGuessr - Puerto Rico</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>

<h2>BioGuessr — Puerto Rico</h2>

<label>Filter:</label>
<select id="filter">
  <option value="">All</option>
  <option value="3">Birds</option>
  <option value="47126">Plants</option>
  <option value="47158">Insects</option>
  <option value="40151">Mammals</option>
  <option value="26036">Reptiles</option>
  <option value="20978">Amphibians</option>
</select>

<button id="startBtn">Start Round</button>

<div id="map" style="width:100%; height:400px;"></div>

<h3>Guess the Species</h3>
<div id="choices"></div>

<h3 id="result"></h3>
<h3>Score: <span id="score">0</span></h3>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([18.2, -66.5], 8);

// Satellite map
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19
}).addTo(map);

let marker;
let score = 0;
let correctAnswer = "";
let correctPhoto = "";
let attempts = 0;

// Start button
document.getElementById("startBtn").onclick = startRound;
document.getElementById("filter").onchange = startRound;

function startRound() {
  attempts = 0;
  newRound();
}

function newRound() {
  document.getElementById("result").textContent = "";
  document.getElementById("choices").innerHTML = "Loading...";

  const lat = 17.8 + Math.random() * (18.5 - 17.8);
  const lng = -67.3 + Math.random() * (-65.2 + 67.3);

  if (marker) map.removeLayer(marker);
  marker = L.marker([lat, lng]).addTo(map);
  map.setView([lat, lng], 10);

  loadGame(lat, lng);
}

async function loadGame(lat, lng) {
  try {
    const filter = document.getElementById("filter").value;

    // Local species
    let localURL = `https://api.inaturalist.org/v1/observations/species_counts?lat=${lat}&lng=${lng}&radius=25&per_page=20`;
    if (filter) localURL += `&taxon_id=${filter}`;

    const localRes = await fetch(localURL);
    const localData = await localRes.json();

    if (!localData.results || localData.results.length < 4) {
      retryRound();
      return;
    }

    const correct = localData.results[
      Math.floor(Math.random() * localData.results.length)
    ];

    if (!correct.taxon) {
      retryRound();
      return;
    }

    correctAnswer =
      correct.taxon.preferred_common_name || correct.taxon.name;

    correctPhoto =
      correct.taxon.default_photo?.medium_url || "";

    const taxonId = filter || correct.taxon.iconic_taxon_id;

    // Get similar species across PR
    const otherRes = await fetch(
      `https://api.inaturalist.org/v1/observations/species_counts?nelat=18.5&nelng=-65.2&swlat=17.8&swlng=-67.3&taxon_id=${taxonId}&per_page=50`
    );
    const otherData = await otherRes.json();

    if (!otherData.results) {
      retryRound();
      return;
    }

    const options = [];

    // Add correct first
    options.push({
      name: correctAnswer,
      photo: correctPhoto,
      correct: true
    });

    // Add wrong answers
    for (let item of otherData.results) {
      const name =
        item.taxon?.preferred_common_name || item.taxon?.name;

      const photo =
        item.taxon?.default_photo?.medium_url || "";

      if (
        name &&
        name !== correctAnswer &&
        !options.find(o => o.name === name)
      ) {
        options.push({
          name: name,
          photo: photo,
          correct: false
        });
      }

      if (options.length >= 4) break;
    }

    // Fill fallback if needed
    while (options.length < 4) {
      options.push({
        name: "Unknown Species",
        photo: "",
        correct: false
      });
    }

    // Shuffle
    options.sort(() => Math.random() - 0.5);

    displayChoices(options);

  } catch (err) {
    console.error(err);
    document.getElementById("choices").textContent = "Error loading data";
  }
}

function retryRound() {
  attempts++;
  if (attempts > 5) {
    document.getElementById("choices").textContent = "Could not load data.";
    return;
  }
  newRound();
}

// Display with images
function displayChoices(options) {
  const container = document.getElementById("choices");
  container.innerHTML = "";

  options.forEach(option => {
    const btn = document.createElement("button");

    btn.style.display = "block";
    btn.style.marginBottom = "10px";

    btn.innerHTML = `
      ${option.photo ? `<img src="${option.photo}" width="100"><br>` : ""}
      ${option.name}
    `;

    btn.onclick = () => checkAnswer(option);

    container.appendChild(btn);
  });
}

// Check answer
function checkAnswer(option) {
  const result = document.getElementById("result");

  if (option.correct) {
    result.textContent = "✅ Correct!";
    score += 100;
  } else {
    result.textContent = `❌ Wrong! Correct answer: ${correctAnswer}`;
    score -= 50;
  }

  document.getElementById("score").textContent = score;
}
</script>

</body>
</html>
