<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Puerto Rico Species Map</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>

<h2>Puerto Rico Species Explorer</h2>

<label>Filter:</label>
<select id="filter">
  <option value="">All</option>
  <option value="3">Birds</option>
  <option value="47126">Plants</option>
  <option value="47158">Insects</option>
  <option value="40151">Mammals</option>
  <option value="26036">Reptiles</option>
  <option value="20978">Amphibians</option>
</select>

<button id="randomBtn">Random Location</button>

<div id="map" style="width:100%; height:400px;"></div>

<h3>Selected Location</h3>
<p id="coords">None</p>

<h3>Species Found</h3>
<ul id="speciesList"></ul>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([18.2, -66.5], 8); // Puerto Rico center

// Satellite tiles (no API key)
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19
}).addTo(map);

let marker;

// Click handler
map.on('click', function(e) {
  placeMarker(e.latlng.lat, e.latlng.lng);
});

// Random Puerto Rico location
document.getElementById("randomBtn").onclick = () => {
  const lat = 17.8 + Math.random() * (18.5 - 17.8);
  const lng = -67.3 + Math.random() * (-65.2 + 67.3);
  placeMarker(lat, lng);
};

// Filter change reloads species
document.getElementById("filter").onchange = () => {
  if (marker) {
    const latlng = marker.getLatLng();
    loadSpecies(latlng.lat, latlng.lng);
  }
};

// Place marker + fetch species
function placeMarker(lat, lng) {
  if (marker) map.removeLayer(marker);

  marker = L.marker([lat, lng]).addTo(map);

  map.setView([lat, lng], 10);

  document.getElementById("coords").textContent =
    lat.toFixed(5) + ", " + lng.toFixed(5);

  loadSpecies(lat, lng);
}

// Fetch species from iNaturalist
async function loadSpecies(lat, lng) {
  const list = document.getElementById("speciesList");
  list.innerHTML = "<li>Loading...</li>";

  const filter = document.getElementById("filter").value;

  let url = `https://api.inaturalist.org/v1/observations/species_counts?lat=${lat}&lng=${lng}&radius=25&per_page=20`;

  if (filter) {
    url += `&taxon_id=${filter}`;
  }

  try {
    const res = await fetch(url);
    const data = await res.json();

    list.innerHTML = "";

    if (data.results.length === 0) {
      list.innerHTML = "<li>No species found</li>";
      return;
    }

    data.results.forEach(item => {
      const name =
        item.taxon.preferred_common_name || item.taxon.name;

      const li = document.createElement("li");
      li.textContent = name;

      list.appendChild(li);
    });

  } catch (err) {
    console.error(err);
    list.innerHTML = "<li>Error loading species</li>";
  }
}
</script>

</body>
</html>
