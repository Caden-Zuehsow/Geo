<!doctype html>
<html lang="en">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2567172915118232"
     crossorigin="anonymous"></script>
  <meta charset="utf-8" />
  <title>GeoBrawl — Indiana Mode</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="/geofavicon/favicon.ico" />

  <style>
    :root {
      --bg:#11284B;
      --panel:#1A355F;
      --accent:#4A90D6;
      --text:#E8E8E8;
    }

    * { box-sizing: border-box; }

    body {
      margin:0;
      padding:0;
      font-family:system-ui,Arial;
      color:var(--text);
      background:var(--bg);
    }

    /* ===== HEADER ===== */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: transparent;
      z-index: 1000;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .logo-container img {
      height: 40px;
    }

    .home-text {
      font-weight: 600;
      color: white;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
      font-size: 0.95rem;
    }

    nav {
      display: flex;
      gap: 18px;
    }

    nav a {
      text-decoration: none;
      color: white;
      font-weight: 700;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
      font-size: 0.95rem;
    }

    .menu-toggle {
      display: none;
      font-size: 1.6rem;
      color: white;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      nav {
        position: absolute;
        top: 60px;
        right: 20px;
        background: var(--panel);
        border-radius: 10px;
        padding: 10px;
        flex-direction: column;
        gap: 10px;
        display: none;
      }

      nav.active { display: flex; }
      .menu-toggle { display: block; }
    }

    /* ===== PAGE LAYOUT ===== */
    #container {
      width:100%;
      max-width:520px;
      margin: 0 auto;
      padding: 100px 20px 20px; /* pushes below header */
    }

    #logo {
      width:140px;
      display:block;
      margin:0 auto 14px auto;
      cursor:pointer;
      transition:transform 0.2s ease;
    }

    #logo:hover { transform:scale(1.05); }

    h1 {
      text-align:center;
      color:var(--accent);
      margin-bottom:10px;
    }

    .panel {
      background:var(--panel);
      padding:14px;
      border-radius:12px;
      margin-bottom:14px;
    }

    button {
      width:100%;
      padding:10px;
      font-weight:600;
      border-radius:8px;
      border:none;
      cursor:pointer;
      background:var(--accent);
      color:white;
      margin-top:6px;
    }

    #streetView, #map {
      width:100%;
      height:260px;
      border-radius:8px;
      margin-bottom:8px;
    }

    .score {
      font-weight:600;
      margin-top:6px;
    }

    footer {
      text-align:center;
      margin-top:30px;
      font-size:0.9rem;
      color:#CFCFCF;
    }

    .footer-links a {
      color:#9bb5ff;
      text-decoration:none;
      font-weight:600;
    }
  </style>

  <script>
    function toggleMenu() {
      document.getElementById("navMenu").classList.toggle("active");
    }
  </script>
</head>

<body>

<!-- HEADER -->
<header>
  <a href="/" class="logo-container">
    <img src="/geofavicon/logo.png">
    <span class="home-text">Home</span>
  </a>

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <nav id="navMenu">
    <a href="/public/">Multiplayer</a>
    <a href="/solo/">Single Player</a>
    <a href="/socials/">Social</a>
    <a href="/about/">About Us</a>
  </nav>
</header>

<div id="container">

  <a href="/">
    <img id="logo" src="/geofavicon/logo.png" alt="GeoBrawl Logo">
  </a>

  <h1>GeoBrawl — Indiana Mode</h1>

  <div class="panel">
    <button id="startBtn">Start New Game</button>
    <div class="score">Round: <span id="round">0</span></div>
    <div class="score">Score: <span id="score">0</span></div>
  </div>

  <div class="panel">
    <div id="streetView">Loading Street View…</div>
  </div>

  <div class="panel">
    <div id="map"></div>
    <button id="submitGuessBtn" disabled>Submit Guess</button>
  </div>

  <div class="panel" id="resultPanel" style="display:none;">
    <div id="resultText"></div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-links">
      <a href="/privacy/">Privacy Policy & Terms of Service</a>
    </div>
    <p>Website by Mahlan Media Webservices</p>
  </footer>

</div>

<!-- Google Maps API (UNCHANGED) -->
<script async
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCQHZHmpF-9_7jEixW8z_h_-zbImwnI3S0&libraries=geometry&callback=initSolo">
</script>
  
<script>
window.initSolo = async function() {
  let pickerLatLng = null;
  let round = 0;
  let score = 0;
  let indianaPolygon = null;
  let hasGuessed = false;

  const streetViewDiv = document.getElementById('streetView');
  const mapDiv = document.getElementById('map');
  const startBtn = document.getElementById('startBtn');
  const roundSpan = document.getElementById('round');
  const scoreSpan = document.getElementById('score');
  const resultPanel = document.getElementById('resultPanel');
  const resultText = document.getElementById('resultText');
  const submitGuessBtn = document.getElementById('submitGuessBtn');

  let svPanorama, map, marker, actualMarker, line;
  let mapMarkers = [];

  map = new google.maps.Map(mapDiv, {
    center: { lat: 39.8, lng: -86.1 },
    zoom: 7,
    gestureHandling: "greedy",
  });

  // ===== LOAD INDIANA GEOJSON =====
  async function loadIndiana() {
    const res = await fetch("https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json");
    const data = await res.json();

    const indianaFeature = data.features.find(f => f.properties.name === "Indiana");
    const coords = indianaFeature.geometry.coordinates[0];

    const path = coords.map(c => ({ lat: c[1], lng: c[0] }));

    indianaPolygon = new google.maps.Polygon({
      paths: path
    });
  }

  await loadIndiana();

  // ===== RANDOM POINT INSIDE INDIANA =====
  function getRandomPointInIndiana() {
    const bounds = {
      north: 41.8,
      south: 37.7,
      west: -88.1,
      east: -84.7
    };

    while (true) {
      const lat = bounds.south + Math.random() * (bounds.north - bounds.south);
      const lng = bounds.west + Math.random() * (bounds.east - bounds.west);

      const point = new google.maps.LatLng(lat, lng);

      if (google.maps.geometry.poly.containsLocation(point, indianaPolygon)) {
        return point;
      }
    }
  }

  // ===== STREET VIEW PICKER =====
  function getRandomStreetViewLocation(callback) {
    const svService = new google.maps.StreetViewService();

    function tryLocation() {
      const latLng = getRandomPointInIndiana();

      svService.getPanorama({ location: latLng, radius: 20000 }, (data, status) => {
        if (status === google.maps.StreetViewStatus.OK) {
          callback(data.location.latLng);
        } else {
          tryLocation();
        }
      });
    }

    tryLocation();
  }

  // ===== START ROUND =====
  function startRound() {
    round++;
    roundSpan.textContent = round;
    resultPanel.style.display = 'none';
    submitGuessBtn.disabled = true;
    hasGuessed = false;

    if(marker) marker.setMap(null);
    if(actualMarker) actualMarker.setMap(null);
    if(line) line.setMap(null);

    mapMarkers.forEach(m => m.setMap(null));
    marker = null;
    actualMarker = null;
    line = null;

    getRandomStreetViewLocation(latLng => {
      pickerLatLng = { lat: latLng.lat(), lng: latLng.lng() };

      svPanorama = new google.maps.StreetViewPanorama(streetViewDiv, {
        position: pickerLatLng,
        pov: { heading: 0, pitch: 0 },
        zoom: 1,
        disableDefaultUI: true
      });
    });
  }

  startBtn.onclick = startRound;

  // ===== MAP CLICK (ONE GUESS ONLY) =====
  map.addListener('click', e => {
    if (hasGuessed) return;

    if(marker) marker.setMap(null);

    marker = new google.maps.Marker({
      position: e.latLng,
      map: map
    });

    submitGuessBtn.disabled = false;
  });

  // ===== SUBMIT GUESS =====
  submitGuessBtn.onclick = () => {
    if(!marker) return alert("Click on the map to place your guess!");

    hasGuessed = true;

    const guessLatLng = marker.getPosition();
    const actualLatLng = new google.maps.LatLng(pickerLatLng.lat, pickerLatLng.lng);

    // Distance
    const dist = google.maps.geometry.spherical.computeDistanceBetween(
      guessLatLng,
      actualLatLng
    );

    const miles = dist / 1609.34;
    const points = Math.max(0, 50 - Math.round(miles));

    score += points;
    scoreSpan.textContent = score;

    // ===== SHOW CORRECT LOCATION =====
    actualMarker = new google.maps.Marker({
      position: actualLatLng,
      map: map,
      icon: {
        url: "http://maps.google.com/mapfiles/ms/icons/green-dot.png"
      }
    });

    // ===== DRAW LINE =====
    line = new google.maps.Polyline({
      path: [guessLatLng, actualLatLng],
      geodesic: true,
      strokeColor: "#00FFAA",
      strokeOpacity: 1.0,
      strokeWeight: 2,
      map: map
    });

    // Fit map to show both points
    const bounds = new google.maps.LatLngBounds();
    bounds.extend(guessLatLng);
    bounds.extend(actualLatLng);
    map.fitBounds(bounds);

    resultText.innerHTML = `
      Distance: ${miles.toFixed(1)} miles<br>
      Points: ${points}
    `;
    resultPanel.style.display = '';

    submitGuessBtn.disabled = true;
  };
};
</script>

</body>
</html>
