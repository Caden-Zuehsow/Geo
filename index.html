<!doctype html>
<html lang="en">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1e90ff">
  <meta name="google-adsense-account" content="ca-pub-2567172915118232">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2567172915118232"
     crossorigin="anonymous"></script>

  <!-- Google tag -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BPYMG0BNRP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-BPYMG0BNRP');
  </script>

  <meta charset="utf-8">
  <title>GeoBrawl</title>

  <!-- FAVICONS -->
  <link rel="icon" type="image/png" href="/geofavicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/geofavicon/favicon.svg" />
  <link rel="shortcut icon" href="/geofavicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/geofavicon/apple-touch-icon.png" />
  <link rel="manifest" href="/geofavicon/site.webmanifest" />

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --ocean: #4A90D6;
      --background: #11284B;
      --button: #4A90D6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, Arial, sans-serif;
      background: var(--background);
      margin: 0;
      padding: 0;
      text-align: center;
      color: #E8E8E8;
    }

    /* ===== HEADER ===== */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: transparent;
      z-index: 1000;
    }

    .logo {
      font-weight: 400; /* UNBOLDED */
      font-size: 1.2rem;
      color: white;
      text-decoration: none;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    }

    nav {
      display: flex;
      gap: 18px;
    }

    nav a {
      text-decoration: none;
      color: white;
      font-weight: 700; /* BOLD for nav links */
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
      white-space: nowrap;
      font-size: 0.95rem;
    }

    /* ===== HAMBURGER ===== */
    .menu-toggle {
      display: none;
      font-size: 1.6rem;
      color: white;
      cursor: pointer;
    }

    /* ===== MOBILE NAV ===== */
    @media (max-width: 768px) {
      nav {
        position: absolute;
        top: 60px;
        right: 20px;
        background: #1A355F;
        border-radius: 10px;
        padding: 10px;
        flex-direction: column;
        gap: 10px;
        display: none;
      }

      nav.active {
        display: flex;
      }

      .menu-toggle {
        display: block;
      }
    }

    /* ===== CONTENT ===== */
    .content {
      padding: 110px 30px 30px;
    }

    #logo-img {
      width: 200px;
      margin: 20px auto;
      filter: drop-shadow(0px 0px 14px rgba(0,0,0,0.4));
    }

    h1 {
      margin: 0;
      color: var(--ocean);
      font-size: 2.8rem;
      font-weight: 700;
    }

    p {
      font-size: 1.1rem;
      margin-top: 10px;
    }

    a.button {
      background: var(--button);
      color: white;
      padding: 14px 22px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 1.3rem;
      font-weight: 600;
      display: block;
      margin: 15px auto 0 auto;
      width: 220px;
      transition: 0.2s;
    }

    a.button:hover {
      background: #2f6cb0;
      transform: translateY(-2px);
    }

    footer {
      margin-top: 60px;
      font-size: 0.9rem;
      color: #CFCFCF;
    }

    .footer-links a {
      color: #9bb5ff;
      margin: 0 10px;
      text-decoration: none;
      font-weight: 600;
    }
  </style>

  <script>
    function toggleMenu() {
      document.getElementById("navMenu").classList.toggle("active");
    }

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/service-worker.js");
    }
  </script>
</head>

<body>

  <!-- HEADER -->
  <header>
    <a href="/" class="logo">Home</a>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <nav id="navMenu">
      <a href="/public/index.html">Multiplayer</a>
      <a href="/solo/index.html">Single Player</a>
      <a href="/socials/index.html">Social</a>
      <a href="/about/index.html">About Us</a>
    </nav>
  </header>

  <!-- CONTENT -->
  <div class="content">
    <img id="logo-img" src="/geofavicon/logo.png" alt="GeoBrawl Logo">

    <h1>GeoBrawl</h1>
    <p>GeoBrawl lets you and your friends choose each others guessing location</p>

    <a class="button" href="/solo/index.html">Single Player</a>
    <a class="button" href="/public/index.html">Multiplayer</a>

    <footer>
      <div class="footer-links">
        <a href="/about/index.html">About Us</a>
      </div>
      <p>Website by Mahlan Media Webservices</p>
    </footer>
  </div>

</body>
</html>
