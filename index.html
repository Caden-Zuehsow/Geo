<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>GeoBrawl</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" type="image/png" href="/geofavicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/geofavicon/favicon.svg" />
  <link rel="shortcut icon" href="/geofavicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/geofavicon/apple-touch-icon.png" />
  <link rel="manifest" href="/geofavicon/site.webmanifest" />

  <style>
    :root {
      --ocean: #4A90D6;
      --background: #11284B;
      --button: #4A90D6;
      --panel: #1A355F;
      --text: #E8E8E8;
    }

    * { box-sizing: border-box; }

    body {
      font-family: system-ui, Arial, sans-serif;
      background: var(--background);
      color: var(--text);
      margin: 0;
      padding: 0;
      text-align: center;
      position: relative;
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: transparent;
      z-index: 1000;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .logo-container img {
      height: 40px;
      width: auto;
    }

    .home-text {
      font-weight: 600;
      color: white;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
      font-size: 0.95rem;
      white-space: nowrap;
    }

    nav {
      display: flex;
      gap: 18px;
    }

    nav a {
      text-decoration: none;
      color: white;
      font-weight: 700;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
      white-space: nowrap;
      font-size: 0.95rem;
    }

    .menu-toggle {
      display: none;
      font-size: 1.6rem;
      color: white;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      nav {
        position: absolute;
        top: 60px;
        right: 20px;
        background: var(--panel);
        border-radius: 10px;
        padding: 10px;
        flex-direction: column;
        gap: 10px;
        display: none;
      }

      nav.active { display: flex; }
      .menu-toggle { display: block; }
    }

    /* ===== CONTENT ===== */
    .content {
      padding: 120px 20px 30px;
      max-width: 500px;
      margin: 0 auto;
    }

#logo-img {
  width: 250px;        /* make it larger */
  max-width: 90%;      /* responsive */
  margin: 10px auto;
  display: block;
  filter: drop-shadow(0px 0px 14px rgba(0,0,0,0.4));
}
    h1 {
      margin: 20px 0 10px;
      color: var(--ocean);
      font-size: 2.8rem;
      font-weight: 700;
    }

    p {
      font-size: 1.1rem;
      margin: 10px 0 30px;
    }

    a.button {
      background: var(--button);
      color: white;
      padding: 14px 22px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 1.3rem;
      font-weight: 600;
      display: block;
      margin: 15px auto 0 auto;
      width: 220px;
      transition: 0.2s;
    }

    a.button:hover {
      background: #2f6cb0;
      transform: translateY(-2px);
    }

    footer {
      margin-top: 60px;
      font-size: 0.9rem;
      color: #CFCFCF;
    }

    .footer-links a {
      color: #9bb5ff;
      margin: 0 10px;
      text-decoration: none;
      font-weight: 600;
    }

    /* ===== COOKIE CONSENT ===== */
    #cookie-banner {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--panel);
      color: white;
      padding: 20px 25px;
      border-radius: 12px;
      font-size: 1rem;
      display: none;
      flex-direction: column;
      gap: 15px;
      align-items: center;
      z-index: 2000;
      max-width: 90%;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      text-align: center;
    }

    #cookie-banner button {
      background: var(--ocean);
      border: none;
      color: white;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
    }

    #cookie-banner button:hover { background: #2f6cb0; }

  </style>

  <script>
    function toggleMenu() {
      document.getElementById("navMenu").classList.toggle("active");
    }

    function acceptCookies() {
      localStorage.setItem('cookiesAccepted', 'true');
      document.getElementById('cookie-banner').style.display = 'none';
    }

    window.addEventListener('DOMContentLoaded', () => {
      if (!localStorage.getItem('cookiesAccepted')) {
        document.getElementById('cookie-banner').style.display = 'flex';
      }
    });
  </script>
</head>

<body>

  <!-- HEADER -->
  <header>
    <a href="/" class="logo-container">
      <img src="/geofavicon/logo.png" alt="GeoBrawl Logo" class="logo">
      <span class="home-text">Home</span>
    </a>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <nav id="navMenu">
      <a href="/public/ ">Multiplayer</a>
      <a href="/solo/ ">Single Player</a>
      <a href="/socials/ ">Social</a>
      <a href="/about/ ">About Us</a>
    </nav>
  </header>

  <!-- CONTENT -->
  <div class="content">
    <img id="logo-img" src="/geofavicon/logo.png" alt="GeoBrawl Logo">

    <h1>GeoBrawl</h1>
    <p>GeoBrawl lets you and your friends choose each other's guessing location</p>

    <a class="button" href="/solo/ ">Single Player</a>
    <a class="button" href="/public/ ">Multiplayer</a>

    <footer>
      <div class="footer-links">
        <a href="/privacy/ ">Privacy Policy & Terms of Service</a>
      </div>
      <p>Website by Mahlan Media Webservices</p>
    </footer>
  </div>

  <!-- COOKIE BANNER -->
  <div id="cookie-banner">
    🍪 This website uses cookies for analytics and ads. <br>
    <a href="/privacy/ " style="color: #9bb5ff; text-decoration: underline;">Privacy Policy</a><br>
    <button onclick="acceptCookies()">Allow Cookies</button>
  </div>

</body>
</html>
