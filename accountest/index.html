<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>GeoBrawl Login Test</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <style>
    body {
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:system-ui, Arial;
      background:#11284B;
      color:white;
    }

    .panel {
      background:#1A355F;
      padding:30px;
      border-radius:14px;
      text-align:center;
      width:320px;
    }

    input {
      width:100%;
      padding:10px;
      margin-top:8px;
      border-radius:8px;
      border:none;
    }

    button {
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:8px;
      background:#4A90D6;
      color:white;
      font-weight:600;
      cursor:pointer;
    }

    #logoutBtn { background:#d64a4a; }
    #status { margin-top:15px; font-size:14px; }
  </style>
</head>

<body>

<div class="panel">
  <h1>Login Test</h1>

  <input id="username" placeholder="Username">
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button id="loginEmailBtn">Login</button>
  <button id="signupBtn">Create Account</button>

  <button id="logoutBtn" style="display:none;">Logout</button>

  <div id="status">Checking login...</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import {
    getAuth,
    signOut,
    onAuthStateChanged,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    updateProfile
  } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

  import {
    getFirestore,
    doc,
    setDoc,
    getDoc
  } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCcW_J0iS9sVAKkM-WAeUEUSn5Z9iMcTP8",
    authDomain: "geobrawll.firebaseapp.com",
    projectId: "geobrawll"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const usernameInput = document.getElementById("username");
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");

  const loginEmailBtn = document.getElementById("loginEmailBtn");
  const signupBtn = document.getElementById("signupBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const status = document.getElementById("status");

  // LOGIN
  loginEmailBtn.onclick = async () => {
    try {
      await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
    } catch (err) {
      console.error(err);
      alert(err.message);
    }
  };

  // SIGNUP (UPDATED)
  signupBtn.onclick = async () => {
    const username = usernameInput.value.trim().toLowerCase();

    if (!username) {
      alert("Enter a username");
      return;
    }

    try {
      console.log("Checking username...");

      const usernameRef = doc(db, "usernames", username);
      const usernameDoc = await getDoc(usernameRef);

      if (usernameDoc.exists()) {
        alert("Username already taken");
        return;
      }

      console.log("Creating user...");

      const userCred = await createUserWithEmailAndPassword(
        auth,
        emailInput.value,
        passwordInput.value
      );

      console.log("User created:", userCred.user.uid);

      console.log("Reserving username...");

      await setDoc(usernameRef, {
        uid: userCred.user.uid
      });

      await setDoc(doc(db, "users", userCred.user.uid), {
        username: username
      });

      await updateProfile(userCred.user, {
        displayName: username
      });

      console.log("Account fully created");

    } catch (err) {
      console.error("FULL ERROR:", err);
      alert(err.message);
    }
  };

  // LOGOUT
  logoutBtn.onclick = () => signOut(auth);

  // AUTH STATE
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      console.log("User logged in:", user.uid);

      let username = user.displayName;

      const snap = await getDoc(doc(db, "users", user.uid));
      if (snap.exists()) {
        username = snap.data().username;
      }

      status.textContent = "Logged in as: " + username;
      logoutBtn.style.display = "block";

    } else {
      status.textContent = "Not logged in";
      logoutBtn.style.display = "none";
    }
  });
</script>

</body>
</html>
