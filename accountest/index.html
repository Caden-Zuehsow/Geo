<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>GeoBrawl Login Test</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <style>
    body {
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:system-ui, Arial;
      background:#11284B;
      color:white;
    }

    .panel {
      background:#1A355F;
      padding:30px;
      border-radius:14px;
      text-align:center;
      width:320px;
    }

    h1 { margin-bottom:20px; color:#4A90D6; }

    input {
      width:100%;
      padding:10px;
      margin-top:8px;
      border-radius:8px;
      border:none;
    }

    button {
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:8px;
      background:#4A90D6;
      color:white;
      font-weight:600;
      cursor:pointer;
    }

    #logoutBtn { background:#d64a4a; }

    #status { margin-top:15px; font-size:14px; }

    .divider { margin:12px 0; opacity:0.6; }
  </style>
</head>

<body>

<div class="panel">
  <h1>Login Test</h1>

  <input id="username" placeholder="Username">
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button id="loginEmailBtn">Login</button>
  <button id="signupBtn">Create Account</button>

  <div class="divider">or</div>

  <button id="loginGoogleBtn">Login with Google</button>
  <button id="logoutBtn" style="display:none;">Logout</button>

  <div id="status">Checking login...</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    signOut,
    onAuthStateChanged,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    updateProfile
  } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

  import {
    getFirestore,
    doc,
    setDoc,
    getDoc
  } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCcW_J0iS9sVAKkM-WAeUEUSn5Z9iMcTP8",
    authDomain: "geobrawll.firebaseapp.com",
    projectId: "geobrawll",
    storageBucket: "geobrawll.firebasestorage.app",
    messagingSenderId: "398103346364",
    appId: "1:398103346364:web:8ad24433f9bc465466a4b9"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const usernameInput = document.getElementById("username");
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");

  const loginEmailBtn = document.getElementById("loginEmailBtn");
  const signupBtn = document.getElementById("signupBtn");
  const loginGoogleBtn = document.getElementById("loginGoogleBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const status = document.getElementById("status");

  const provider = new GoogleAuthProvider();

  // 📧 LOGIN
  loginEmailBtn.onclick = async () => {
    try {
      await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
    } catch (err) {
      alert(err.message);
    }
  };

  // 🆕 SIGNUP (UNIQUE USERNAME)
  signupBtn.onclick = async () => {
    const username = usernameInput.value.trim();

    if (!username) {
      alert("Enter a username");
      return;
    }

    try {
      // 🔒 CHECK IF USERNAME EXISTS (THIS IS THE KEY PART)
      const usernameDoc = await getDoc(doc(db, "usernames", username));

      if (usernameDoc.exists()) {
        alert("Username already taken");
        return;
      }

      // CREATE ACCOUNT
      const userCred = await createUserWithEmailAndPassword(
        auth,
        emailInput.value,
        passwordInput.value
      );

      // SAVE USERNAME
      await setDoc(doc(db, "usernames", username), {
        uid: userCred.user.uid
      });

      // LINK USER → USERNAME
      await setDoc(doc(db, "users", userCred.user.uid), {
        username: username
      });

      // SET DISPLAY NAME
      await updateProfile(userCred.user, {
        displayName: username
      });

    } catch (err) {
      alert(err.message);
    }
  };

  // 🔵 GOOGLE LOGIN
  loginGoogleBtn.onclick = async () => {
    try {
      await signInWithPopup(auth, provider);
    } catch (err) {
      alert(err.message);
    }
  };

  // 🚪 LOGOUT
  logoutBtn.onclick = () => signOut(auth);

  // 🔄 STATE
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      let username = user.displayName;

      // fallback to DB
      const snap = await getDoc(doc(db, "users", user.uid));
      if (snap.exists()) {
        username = snap.data().username;
      }

      status.textContent = "Logged in as: " + username;

      logoutBtn.style.display = "block";
      loginGoogleBtn.style.display = "none";
      loginEmailBtn.style.display = "none";
      signupBtn.style.display = "none";
      emailInput.style.display = "none";
      passwordInput.style.display = "none";
      usernameInput.style.display = "none";

    } else {
      status.textContent = "Not logged in";

      logoutBtn.style.display = "none";
      loginGoogleBtn.style.display = "block";
      loginEmailBtn.style.display = "block";
      signupBtn.style.display = "block";
      emailInput.style.display = "block";
      passwordInput.style.display = "block";
      usernameInput.style.display = "block";
    }
  });
</script>

</body>
</html>
