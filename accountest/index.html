<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>GeoBrawl Login Test</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <style>
    body {
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:system-ui, Arial;
      background:#11284B;
      color:white;
    }

    .panel {
      background:#1A355F;
      padding:30px;
      border-radius:14px;
      text-align:center;
      width:300px;
    }

    h1 {
      margin-bottom:20px;
      color:#4A90D6;
    }

    button {
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:8px;
      background:#4A90D6;
      color:white;
      font-weight:600;
      cursor:pointer;
    }

    #logoutBtn {
      background:#d64a4a;
    }

    #status {
      margin-top:15px;
      font-size:14px;
    }
  </style>
</head>

<body>

<div class="panel">
  <h1>Login Test</h1>

  <button id="loginBtn">Login with Google</button>
  <button id="logoutBtn" style="display:none;">Logout</button>

  <div id="status">Checking login...</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCcW_J0iS9sVAKkM-WAeUEUSn5Z9iMcTP8",
    authDomain: "geobrawll.firebaseapp.com",
    projectId: "geobrawll",
    storageBucket: "geobrawll.firebasestorage.app",
    messagingSenderId: "398103346364",
    appId: "1:398103346364:web:8ad24433f9bc465466a4b9",
    measurementId: "G-YSN5E8T2CM"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const status = document.getElementById("status");

  const provider = new GoogleAuthProvider();

  // 🔐 LOGIN
  loginBtn.onclick = async () => {
    try {
      await signInWithPopup(auth, provider);
    } catch (err) {
      console.error("Login error:", err);

      if (err.code === "auth/popup-blocked") {
        alert("Popup blocked. Allow popups and try again.");
      } else if (err.code === "auth/unauthorized-domain") {
        alert("Domain not authorized. Add it in Firebase console.");
      } else {
        alert("Login failed: " + err.message);
      }
    }
  };

  // 🚪 LOGOUT
  logoutBtn.onclick = async () => {
    await signOut(auth);
  };

  // 🔄 AUTH STATE
  onAuthStateChanged(auth, (user) => {
    if (user) {
      status.textContent = "Logged in as: " + user.displayName;
      loginBtn.style.display = "none";
      logoutBtn.style.display = "block";
    } else {
      status.textContent = "Not logged in";
      loginBtn.style.display = "block";
      logoutBtn.style.display = "none";
    }
  });
</script>

</body>
</html>
